name: Deployment Plan

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      desired_path:
        description: Desired deployment YAML path
        required: false
        default: deploy/preview/marketplace.yaml
      change_address:
        description: Optional deployer change address for unsigned tx generation
        required: false
      cbor_utxos_json:
        description: Optional JSON array of deployer wallet input CBOR values for unsigned tx generation
        required: false

jobs:
  deployment-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DESIRED_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.desired_path || '' }}
      CHANGE_ADDRESS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.change_address || '' }}
      CBOR_UTXOS_JSON: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.cbor_utxos_json || '' }}
      KORA_USER_AGENT: ${{ vars.KORA_USER_AGENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18
          check-latest: true

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate deployment artifacts
        run: |
          set -eu
          mkdir -p artifacts
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            desired_paths=("$DESIRED_PATH")
          else
            mapfile -t desired_paths < <(find deploy -mindepth 2 -maxdepth 2 -name '*.yaml' | sort)
          fi

          for desired_path in "${desired_paths[@]}"; do
            network="$(basename "$(dirname "$desired_path")")"
            args=(--desired "$desired_path" --artifacts-dir "artifacts/$network")
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && { [ -n "$CHANGE_ADDRESS" ] || [ -n "$CBOR_UTXOS_JSON" ]; }; then
              args+=(--change-address "$CHANGE_ADDRESS" --cbor-utxos-json "$CBOR_UTXOS_JSON")
            fi
            pnpm exec tsx scripts/generateDeploymentPlan.ts "${args[@]}"
          done

      - name: Upload deployment plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-plan-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 7
